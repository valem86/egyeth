[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/.netlify/functions/rss-monitor"
  [headers.values]
    # Sostituisci "https://www.tuodominio.it" con il vero dominio di produzione
    Access-Control-Allow-Origin = "https://egyeth.netlify.app"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"